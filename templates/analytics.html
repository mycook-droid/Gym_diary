<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — Gym Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#070809; --surface:rgba(255,255,255,.04); --surface-2:rgba(255,255,255,.07); --border:rgba(255,255,255,.08);
      --border-hi:rgba(232,255,0,.35); --text:#eef1e8; --muted:#6b7267; --accent:#d6f500; --accent-2:rgba(214,245,0,.12);
      --green:#00e87a; --red:#ff4d4d;
    }
    html { color-scheme: dark; }
    body { min-height:100vh; color:var(--text); font-family:'Space Grotesk',sans-serif; background:var(--bg); padding-bottom:calc(80px + env(safe-area-inset-bottom)); }
    nav { position:sticky; top:0; z-index:50; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; background:rgba(7,8,9,.85); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); }
    .nav-logo { text-decoration:none; color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:4px; line-height:1; }
    .nav-logo span { color:var(--accent); }
    .nav-btn { border:1px solid var(--border); background:var(--surface); color:var(--muted); border-radius:10px; padding:7px 13px; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; }
    .nav-btn:hover { border-color:var(--border-hi); color:var(--accent); }

    main { width:min(100%, 880px); margin:0 auto; padding:20px 16px 24px; display:grid; gap:16px; }
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:20px; }
    .hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(54px, 16vw, 80px); letter-spacing:2px; line-height:.9; }
    .hero-sub,.section-title,.stat-label,.mini,.bar-day,.bar-val { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }

    .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .stat { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; }
    .stat-value { font-size:36px; font-weight:600; color:var(--accent); line-height:1; }

    .muscle-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; }
    .muscle-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px; display:grid; gap:8px; }
    .muscle-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .muscle-name { font-size:14px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; }
    .growth { font-family:'Space Mono',monospace; font-size:12px; font-weight:700; }
    .growth.up { color:var(--green); }
    .growth.down { color:var(--red); }
    .spark { width:100%; height:48px; border-radius:10px; background:var(--surface-2); }
    .spark polyline { stroke:var(--accent); filter:drop-shadow(0 0 4px rgba(214,245,0,.45)); }

    .bars { display:grid; gap:10px; }
    .bar-row { display:grid; grid-template-columns:50px 1fr 80px; gap:10px; align-items:center; }
    .bar-track { height:10px; border-radius:999px; background:var(--surface-2); overflow:hidden; }
    .bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,rgba(214,245,0,.45),var(--accent)); }

    .skeleton { border-radius:12px; background:linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size:200% 100%; animation: shimmer 1.6s ease-in-out infinite; }
    @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

    .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(7,8,9,.92); backdrop-filter:blur(28px); border-top:1px solid var(--border); display:grid; grid-template-columns:repeat(4,1fr); padding:8px 8px calc(8px + env(safe-area-inset-bottom)); }
    .bottom-nav a { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:8px 4px; border-radius:14px; color:var(--muted); text-decoration:none; font-family:'Space Mono', monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; }
    .bottom-nav a svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
    .bottom-nav a.active { color:var(--accent); background:var(--accent-2); }

    .app-footer { width:min(100%,880px); margin:0 auto; text-align:center; font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); padding:0 16px 10px; }
    .app-footer a { color:var(--accent); text-decoration:none; }

    @media (max-width: 520px) { .muscle-grid { grid-template-columns:1fr; } }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
</head>
<body>
  <nav>
    <a href="dashboard.html" class="nav-logo">GYM<span>.</span>DIARY</a>
    <button class="nav-btn" onclick="Auth.logout()">Logout</button>
  </nav>

  <main>
    <section class="panel">
      <div class="hero-title">ANALYTICS</div>
      <p class="hero-sub">Real signals of progress, not just numbers.</p>
    </section>

    <section class="panel">
      <p class="section-title" style="margin-bottom:12px;">Last 14 Days Snapshot</p>
      <div id="stats-grid" class="stats-grid">
        <div class="skeleton" style="height:70px"></div><div class="skeleton" style="height:70px"></div><div class="skeleton" style="height:70px"></div><div class="skeleton" style="height:70px"></div>
      </div>
    </section>

    <section class="panel">
      <p class="section-title" style="margin-bottom:12px;">Muscle Growth Overview</p>
      <div id="muscle-grid" class="muscle-grid"></div>
    </section>

    <section class="panel">
      <p class="section-title" style="margin-bottom:12px;">Weekly Training Load</p>
      <div id="weekly-load" class="bars"></div>
    </section>
  </main>

  <footer class="app-footer">
    <a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="about.html">About</a>
  </footer>

  <nav class="bottom-nav">
    <a href="dashboard.html">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Today
    </a>
    <a href="splits.html">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Splits
    </a>
    <a href="analytics.html" class="active">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Stats
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <script src="/static/api.js"></script>
  <script>
    requireAuth();

    const MUSCLES = ["chest", "back", "legs", "shoulders", "biceps", "triceps"];

    function fmtPct(v, digits = 1) {
      const n = Number(v || 0);
      const prefix = n > 0 ? "+" : "";
      return `${prefix}${n.toFixed(digits)}%`;
    }

    function miniLabel(delta) {
      const n = Number(delta || 0);
      const prefix = n >= 0 ? "+" : "";
      return `${prefix}${(n * 100).toFixed(1)}% this week`;
    }

    function sparkline(points, colorClass) {
      const values = (points || []).map(v => Number(v || 0));
      const safe = values.length ? values : new Array(14).fill(0);
      const max = Math.max(...safe, 0.0001);
      const w = 200;
      const h = 48;
      const pad = 5;
      const uw = w - pad * 2;
      const uh = h - pad * 2;

      const coords = safe.map((v, i) => {
        const x = pad + (uw * i) / Math.max(safe.length - 1, 1);
        const y = pad + uh - (v / max) * uh;
        return `${x},${isFinite(y) ? y : pad + uh}`;
      }).join(" ");

      return `
        <svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
          <polyline fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" points="${coords}"></polyline>
          <circle cx="${(w - pad)}" cy="${coords.split(' ').slice(-1)[0].split(',')[1]}" r="1.8" fill="var(--accent)"></circle>
        </svg>
      `;
    }

    function renderSnapshot(snapshot) {
      const grid = document.getElementById("stats-grid");
      const strength = Number(snapshot?.strength_trend || 0);
      grid.innerHTML = `
        <div class="stat"><div class="stat-value">${snapshot?.training_days || 0}</div><div class="stat-label">Training Days</div></div>
        <div class="stat"><div class="stat-value">${snapshot?.total_sets || 0}</div><div class="stat-label">Total Sets</div></div>
        <div class="stat"><div class="stat-value">${fmtPct(snapshot?.consistency_score || 0, 0)}</div><div class="stat-label">Consistency Score</div></div>
        <div class="stat"><div class="stat-value" style="color:${strength >= 0 ? 'var(--green)' : 'var(--red)'}">${fmtPct(strength, 1)}</div><div class="stat-label">Strength Trend</div></div>
      `;
    }

    function renderMuscles(muscles) {
      const wrap = document.getElementById("muscle-grid");
      wrap.innerHTML = MUSCLES.map((muscle) => {
        const item = muscles?.[muscle] || { growth: 0, trend: new Array(14).fill(0), week_delta: 0 };
        const growth = Number(item.growth || 0);
        const up = growth >= 0;

        return `
          <article class="muscle-card">
            <div class="muscle-top">
              <div class="muscle-name">${muscle}</div>
              <div class="growth ${up ? 'up' : 'down'}">${fmtPct(growth, 1)}</div>
            </div>
            ${sparkline(item.trend || [], up ? 'up' : 'down')}
            <div class="mini" style="color:${up ? 'var(--green)' : 'var(--red)'}">${miniLabel(item.week_delta || 0)}</div>
          </article>
        `;
      }).join("");
    }

    function renderWeeklyLoad(weekly) {
      const wrap = document.getElementById("weekly-load");
      const safe = Array.isArray(weekly) && weekly.length ? weekly : [];
      const max = Math.max(...safe.map(d => Number(d.score || 0)), 0.0001);

      if (!safe.length) {
        wrap.innerHTML = `<div class="mini">No data yet. Keep logging to unlock load trends.</div>`;
        return;
      }

      wrap.innerHTML = safe.map((d) => {
        const day = new Date(d.date).toLocaleDateString('en-US', { weekday: 'short' });
        const score = Number(d.score || 0);
        const width = Math.max(2, Math.round((score / max) * 100));

        return `
          <div class="bar-row">
            <div class="bar-day">${day}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
            <div class="bar-val">${score.toFixed(2)}</div>
          </div>
        `;
      }).join("");
    }

    async function loadAnalytics() {
      const res = await Logs.getAnalytics();
      if (!res.ok) {
        renderSnapshot({ training_days: 0, total_sets: 0, consistency_score: 0, strength_trend: 0 });
        renderMuscles({});
        renderWeeklyLoad([]);
        return;
      }

      renderSnapshot(res.data.snapshot || {});
      renderMuscles(res.data.muscles || {});
      renderWeeklyLoad(res.data.weekly_load || []);
    }

    loadAnalytics();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("SW registered"))
        .catch(err => console.log("SW failed", err));
    }
  </script>
</body>
</html>
