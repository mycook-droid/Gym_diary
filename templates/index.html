<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #050505;
      --bg-1: #0e0f10;
      --bg-2: #181a1c;
      --panel: rgba(18, 20, 22, 0.82);
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(232, 255, 0, 0.4);
      --text: #f4f6ee;
      --muted: #8a8f84;
      --neon: #e8ff00;
      --error: #ff5757;
    }

    :root[data-theme="light"] {
      --bg: #f4f6ef;
      --bg-0: #f4f6ef;
      --bg-1: #e9ece4;
      --bg-2: #dde2d8;
      --text: #121512;
      --muted: #4f584c;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-soft: rgba(244, 247, 238, 0.95);
      --line: rgba(17, 19, 17, 0.15);
    }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      background:
        radial-gradient(circle at 12% 12%, rgba(232, 255, 0, 0.12), transparent 28%),
        radial-gradient(circle at 88% 20%, rgba(232, 255, 0, 0.08), transparent 22%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
      display: grid;
      place-items: center;
      padding: 20px;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background-image:
        linear-gradient(rgba(232, 255, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232, 255, 0, 0.03) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
    }

    body::after {
      background: radial-gradient(circle at 50% 110%, rgba(232, 255, 0, 0.09), transparent 58%);
    }

    .shell {
      width: min(100%, 940px);
      display: grid;
      gap: 24px;
      align-items: center;
    }

    .brand {
      text-align: center;
      animation: riseIn 550ms ease;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(58px, 14vw, 124px);
      line-height: 0.92;
      letter-spacing: 4px;
      text-shadow: 0 0 24px rgba(232, 255, 0, 0.08);
    }

    .logo span { color: var(--neon); }

    .tagline {
      margin-top: 10px;
      letter-spacing: 4px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr;
      animation: riseIn 700ms ease;
    }

    .pitch {
      background: rgba(10, 10, 10, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 22px;
      padding: 22px;
      backdrop-filter: blur(12px);
    }

    .pitch-label {
      color: var(--neon);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .pitch h2 {
      margin-top: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      line-height: 0.95;
      letter-spacing: 2px;
      font-weight: 400;
    }

    .pitch p {
      margin-top: 14px;
      color: #a2a89c;
      line-height: 1.7;
      font-size: 12px;
    }

    .card {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      padding: 4px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tab {
      flex: 1;
      border: none;
      border-radius: 10px;
      color: #6f7569;
      background: transparent;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      color: #111;
      background: var(--neon);
      font-weight: 600;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
    }

    .form { display: flex; flex-direction: column; gap: 14px; }
    .form.hidden { display: none; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7f8578;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      padding: 13px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 3px rgba(232, 255, 0, 0.1);
    }

    input::placeholder { color: #5f655b; }

    .btn {
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #f1ff5f 0%, #dcf500 100%);
      color: #0c0d0c;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 3px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.15s, filter 0.2s, opacity 0.2s;
    }

    .btn:hover { filter: brightness(1.05); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .error-msg {
      display: none;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 87, 87, 0.5);
      background: rgba(255, 87, 87, 0.11);
      color: #ff9f9f;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 11px 12px;
    }

    .error-msg.show { display: block; }

    .legal-footer {
      margin-top: 16px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 1px;
      color: #8f958a;
    }

    .legal-footer a {
      color: var(--neon);
      text-decoration: none;
    }

    @media (min-width: 920px) {
      .layout {
        grid-template-columns: minmax(270px, 1fr) minmax(360px, 430px);
        align-items: stretch;
      }
      .pitch { display: flex; flex-direction: column; justify-content: center; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">
      <div class="logo">GYM<span>.</span>DIARY</div>
      <p class="tagline">Track. Save. Improve.</p>
    </div>

    <div class="layout">
      <section class="pitch">
        <div class="pitch-label">Focused Workflow</div>
        <h2>Walk In.<br />Lift Heavy.<br />Log Fast.</h2>
        <p>
          No clutter, no distractions. Just your plan, your numbers, and your progress.
          Built for gym sessions where speed matters.
        </p>
      </section>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('login', event)">Login</button>
          <button class="tab" onclick="switchTab('signup', event)">Sign Up</button>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <form id="login-form" class="form" onsubmit="handleLogin(event)">
          <div>
            <label>Username</label>
            <input type="text" id="login-username" placeholder="ironmike" required />
          </div>
          <div>
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn" id="login-btn">Enter</button>
        </form>

        <form id="signup-form" class="form hidden" onsubmit="handleSignup(event)">
          <div>
            <label>Username</label>
            <input type="text" id="signup-username" placeholder="ironmike" required />
          </div>
          <div>
            <label>Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com" required />
          </div>
          <div>
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn" id="signup-btn">Create Account</button>
        </form>
      </div>
      <div class="legal-footer">
        <a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="about.html">About</a>
      </div>
    </div>
  </div>

  <script src="/static/api.js"></script>
  <script>
    if (getToken()) window.location.href = "dashboard.html";

    function switchTab(tab, clickEvent) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      clickEvent.target.classList.add('active');
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
      showError('');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.toggle('show', !!msg);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Loading...';

      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      const res = await Auth.login(username, password);

      if (res.ok) {
        setToken(res.data.token);
        window.location.href = "dashboard.html";
      } else {
        showError(res.data.error || 'Login failed');
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      btn.disabled = true;
      btn.textContent = 'Loading...';

      const username = document.getElementById('signup-username').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      const res = await Auth.signup(username, email, password);

      if (res.ok) {
        setToken(res.data.token);
        window.location.href = "dashboard.html";
      } else {
        showError(res.data.error || 'Signup failed');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
