<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Gym Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
  --bg:        #070809;
  --bg-2:      #0f1113;
  --surface:   rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.08);
  --border-hi: rgba(232,255,0,0.35);
  --text:      #eef1e8;
  --muted:     #6b7267;
  --accent:    #d6f500;
  --accent-2:  rgba(214,245,0,0.12);
  --green:     #00e87a;
  --red:       #ff4d4d;
}

    html { color-scheme: dark; }
    body { min-height: 100vh; color: var(--text); font-family: 'Space Grotesk', sans-serif; background: var(--bg); padding-bottom: calc(80px + env(safe-area-inset-bottom)); position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.6; }
    a { color: inherit; }
    nav { position: sticky; top: 0; z-index: 50; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(7,8,9,0.85); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
    .nav-logo { text-decoration: none; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; line-height: 1; }
    .nav-logo span { color: var(--accent); }
    .nav-right, .nav-actions { display: flex; gap: 10px; align-items: center; }
    .nav-btn { border: 1px solid var(--border); background: var(--surface); color: var(--muted); border-radius: 10px; padding: 7px 13px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.2s; text-decoration: none; cursor: pointer; }
    .nav-btn:hover { border-color: var(--border-hi); color: var(--accent); }
    main { position: relative; z-index: 1; width: min(100%, 600px); margin: 0 auto; padding: 20px 16px 24px; display: grid; gap: 16px; }
    main > section, main > div { animation: cardIn 0.4s cubic-bezier(0.22,1,0.36,1) both; }
    main > section:nth-child(1), main > div:nth-child(1) { animation-delay: 0s; }
    main > section:nth-child(2), main > div:nth-child(2) { animation-delay: 0.07s; }
    main > section:nth-child(3), main > div:nth-child(3) { animation-delay: 0.14s; }
    main > section:nth-child(4), main > div:nth-child(4) { animation-delay: 0.21s; }
    .card, .panel, .section, .hero, #workout-content, .footer, .legal-footer, .app-footer, .rest-card, .no-split, .item, .stat, .line-wrap, .split-card, .preset-card, .empty, .builder-note, .prev-session, .list div, .list-links a { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; transition: border-color 0.2s, transform 0.18s; }
    .card:hover, .panel:hover, .section:hover, .hero:hover, #workout-content:hover, .footer:hover, .legal-footer:hover, .app-footer:hover, .rest-card:hover, .no-split:hover, .item:hover, .stat:hover, .line-wrap:hover, .split-card:hover, .preset-card:hover, .empty:hover, .builder-note:hover, .prev-session:hover, .list div:hover, .list-links a:hover { border-color: var(--border-hi); transform: translateY(-2px); }
    .title, .hero-title, .name, .modal-title, .preset-name, .split-name, .ex-name, .stat-value, .rest-title, h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
    .logo, .date-day { font-family: 'Bebas Neue', sans-serif; }
    .sub, .section-title, .k, .tagline, .date-label, .date-split, .hero-sub, .stat-label, .bar-day, .bar-val, .modal-muscle, .ex-meta, .set-num, .set-input-label, .split-badge, .pitch-label, .u-status, .legal-footer, .app-footer, .day-name { font-family: 'Space Mono', monospace; }
    label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 7px; }
    input, select, textarea { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 15px; padding: 13px 14px; width: 100%; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--border-hi); box-shadow: 0 0 0 3px rgba(214,245,0,0.08); }
    .btn, .btn-yellow, .builder-btn, .save-btn, .btn-save { background: var(--accent); color: #080a05; border: none; border-radius: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; padding: 14px; width: 100%; cursor: pointer; transition: filter 0.2s, transform 0.12s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn:hover, .btn-yellow:hover, .builder-btn:hover, .save-btn:hover, .btn-save:hover { filter: brightness(1.08); }
    .btn:active, .btn-yellow:active, .builder-btn:active, .save-btn:active, .btn-save:active { transform: scale(0.97); }
    .btn:disabled, .builder-btn:disabled, .save-btn:disabled, .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.primary, .btn-activate, .btn-add-set, .close-btn, .modal-close { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 9px 14px; cursor: pointer; transition: all 0.2s; width: auto; }
    .btn.primary:hover, .btn-activate:hover, .btn-add-set:hover, .close-btn:hover, .modal-close:hover { border-color: var(--border-hi); color: var(--text); }
    .exercise-item { padding: 18px 16px; display: flex; align-items: center; gap: 14px; border-radius: 16px; cursor: pointer; justify-content: space-between; }
    .exercise-item:active { transform: scale(0.98); transition: transform 0.08s; }
    .skeleton { border-radius: 14px; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.6s ease-in-out infinite; }
    .toast { position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 14px; padding: 12px 20px; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 1px; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.22,1,0.36,1); z-index: 200; border-left: 3px solid var(--green); }
    .toast.error { border-left-color: var(--red); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .bottom-nav { position: fixed; top: auto; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(7,8,9,0.92); backdrop-filter: blur(28px); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); }
    .bottom-nav a { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 8px 4px; border-radius: 14px; color: var(--muted); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s, background 0.2s; }
    .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .bottom-nav a.active { color: var(--accent); background: var(--accent-2); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (min-width: 720px) { main { padding: 24px 20px 28px; } }
    .panel, .footer { padding: 20px; } .profile-head { display: flex; gap: 16px; align-items: center; } .photo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); background: var(--surface-2); } .name { font-size: 42px; line-height: .9; } .sub { margin-top: 6px; color: var(--muted); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; } .row { margin-top: 16px; display: grid; gap: 12px; } .item { padding: 14px; } .k { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); } .v { margin-top: 6px; line-height: 1.7; } .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; } .list-links { display: grid; gap: 10px; } .list-links a { padding: 16px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; } .footer { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); line-height: 1.8; } .footer a { color: var(--accent); text-decoration: none; } .modal-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.7); display: none; align-items: flex-end; justify-content: center; padding: 0; backdrop-filter: blur(8px); } .modal-overlay.open { display: flex; } .modal { width: min(100%, 600px); background: #0f1113; border: 1px solid var(--border); border-top-left-radius: 28px; border-top-right-radius: 28px; border-bottom: none; padding: 18px 20px calc(32px + env(safe-area-inset-bottom)); max-height: 90vh; overflow: auto; } .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; } .modal-title { font-size: 30px; } .form { display: grid; gap: 12px; } textarea { min-height: 110px; resize: vertical; } .u-status { min-height: 16px; font-size: 11px; } .u-status.ok { color: var(--green); } .u-status.bad { color: var(--red); }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
</head>
<body>
  <nav>
    <a href="dashboard.html" class="nav-logo">GYM<span>.</span>DIARY</a>
    <button class="nav-btn" onclick="Auth.logout()">Logout</button>
  </nav>

  <main>
    <section class="panel">
      <div class="profile-head">
        <img id="view-photo" class="photo" src="https://placehold.co/120x120/111417/e8ff00?text=GYM" alt="Profile" />
        <div>
          <div id="view-name" class="name">Profile</div>
          <div id="view-email" class="sub">-</div>
          <div class="actions">
            <button class="btn primary" onclick="openEdit()">✎ Edit Profile</button>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="item">
          <div class="k">Motivation</div>
          <div id="view-note" class="v">Set your reason. Stay consistent.</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="list-links">
        <a href="settings.html"><span>Settings</span><span>›</span></a>
        <a href="about.html"><span>About</span><span>›</span></a>
        <a href="terms.html"><span>Terms & Conditions</span><span>›</span></a>
        <a href="privacy.html"><span>Privacy Policy</span><span>›</span></a>
      </div>
    </section>

    <section class="footer">
      <div>Developer Links:</div>
      <div>
        <a href="https://mycook-droid.github.io/Zishan_droid/" target="_blank" rel="noopener">Portfolio</a>
        ·
        <a href="https://github.com/mycook_droid" target="_blank" rel="noopener">GitHub</a>
      </div>
      <div style="margin-top:6px;">
        <a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="about.html">About</a>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="edit-overlay" onclick="closeOnOverlay(event)">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">Edit Profile</div>
        <button class="close-btn" onclick="closeEdit()">✕</button>
      </div>

      <form class="form" onsubmit="saveProfile(event)">
        <div>
          <label>Username</label>
          <input id="edit-username" required oninput="checkUsernameLive()" />
          <div id="username-status" class="u-status"></div>
        </div>

        <div>
          <label>Email</label>
          <input id="edit-email" type="email" required />
        </div>

        <div>
          <label>Photo URL</label>
          <input id="edit-photo" placeholder="https://..." />
        </div>

        <div>
          <label>Gym Motivation Note</label>
          <textarea id="edit-note" maxlength="500"></textarea>
        </div>

        <button class="save-btn" id="edit-save-btn" type="submit">Save Changes</button>
      </form>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Today
    </a>
    <a href="splits.html">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Splits
    </a>
    <a href="analytics.html">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Stats
    </a>
    <a href="profile.html" class="active">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/static/api.js"></script>
  <script>
    requireAuth();

    let currentUser = null;
    let usernameAvailable = true;

    function showToast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.background = isError ? "#ff5f5f" : "#2effa5";
      t.style.color = isError ? "#fff" : "#08110c";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    function syncView() {
      if (!currentUser) return;
      document.getElementById("view-name").textContent = currentUser.username || "Profile";
      document.getElementById("view-email").textContent = currentUser.email || "";
      document.getElementById("view-note").textContent = currentUser.motivation_note || "No note yet. Add your mission.";
      document.getElementById("view-photo").src = currentUser.photo_url || "https://placehold.co/120x120/111417/e8ff00?text=GYM";
    }

    async function loadProfile() {
      const res = await Auth.me();
      if (!res.ok) {
        showToast("Failed to load profile", true);
        return;
      }
      currentUser = res.data.user;
      syncView();
    }

    function openEdit() {
      if (!currentUser) return;
      document.getElementById("edit-username").value = currentUser.username || "";
      document.getElementById("edit-email").value = currentUser.email || "";
      document.getElementById("edit-photo").value = currentUser.photo_url || "";
      document.getElementById("edit-note").value = currentUser.motivation_note || "";
      document.getElementById("username-status").textContent = "";
      usernameAvailable = true;
      document.getElementById("edit-overlay").classList.add("open");
    }

    function closeEdit() {
      document.getElementById("edit-overlay").classList.remove("open");
    }

    function closeOnOverlay(e) {
      if (e.target === document.getElementById("edit-overlay")) closeEdit();
    }

    let usernameTimer = null;
    function checkUsernameLive() {
      clearTimeout(usernameTimer);
      usernameTimer = setTimeout(async () => {
        const input = document.getElementById("edit-username").value.trim().toLowerCase();
        const status = document.getElementById("username-status");

        if (!input) {
          usernameAvailable = false;
          status.className = "u-status bad";
          status.textContent = "Username is required";
          return;
        }

        if (currentUser && input === (currentUser.username || "").toLowerCase()) {
          usernameAvailable = true;
          status.className = "u-status ok";
          status.textContent = `@${input} is your current username`;
          return;
        }

        const res = await Auth.checkUsername(input);
        if (!res.ok) {
          usernameAvailable = false;
          status.className = "u-status bad";
          status.textContent = "Could not validate username";
          return;
        }

        usernameAvailable = !!res.data.available;
        if (usernameAvailable) {
          status.className = "u-status ok";
          status.textContent = `@${input} is available`;
        } else {
          status.className = "u-status bad";
          status.textContent = `@${input} is not available`;
        }
      }, 250);
    }

    async function saveProfile(e) {
      e.preventDefault();
      if (!usernameAvailable) {
        showToast("Please choose an available username", true);
        return;
      }

      const btn = document.getElementById("edit-save-btn");
      btn.disabled = true;
      btn.textContent = "Saving...";

      const updates = {
        username: document.getElementById("edit-username").value.trim(),
        email: document.getElementById("edit-email").value.trim(),
        photo_url: document.getElementById("edit-photo").value.trim(),
        motivation_note: document.getElementById("edit-note").value.trim(),
      };

      const res = await Auth.updateProfile(updates);
      if (res.ok) {
        currentUser = res.data.user;
        syncView();
        closeEdit();
        showToast("Profile updated");
      } else {
        showToast(res.data.error || "Update failed", true);
      }

      btn.disabled = false;
      btn.textContent = "Save Changes";
    }

    loadProfile();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("SW registered"))
        .catch(err => console.log("SW failed", err));
    }
  </script>
</body>
</html>
