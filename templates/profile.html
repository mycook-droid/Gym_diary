<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Gym Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08090a;
      --line: rgba(255, 255, 255, 0.1);
      --text: #f2f5ec;
      --muted: #8a9085;
      --accent: #e8ff00;
      --surface: rgba(16, 19, 21, 0.84);
      --surface-2: rgba(24, 27, 30, 0.9);
      --radius-md: 14px;
      --ok: #28d77d;
      --bad: #ff5f5f;
    }

    :root[data-theme="light"] {
      --bg: #f4f6ef;
      --line: rgba(17, 19, 17, 0.15);
      --text: #121512;
      --muted: #4f584c;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-2: rgba(242, 245, 236, 0.95);
    }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      background: linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg), #101315 30%));
      padding-bottom: calc(140px + env(safe-area-inset-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(color-mix(in srgb, var(--accent), transparent 95%) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in srgb, var(--accent), transparent 95%) 1px, transparent 1px);
      background-size: 38px 38px;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      background: color-mix(in srgb, var(--bg), transparent 20%);
    }

    .nav-logo {
      text-decoration: none;
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 3px;
      font-size: 24px;
      line-height: 1;
    }

    .nav-logo span { color: var(--accent); }

    .nav-btn {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      border-radius: 999px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 13px;
      cursor: pointer;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 16px;
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .profile-head {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--line);
      background: var(--surface-2);
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      line-height: 0.95;
      letter-spacing: 1px;
    }

    .sub { margin-top: 6px; color: var(--muted); font-size: 11px; letter-spacing: 1px; }

    .row { margin-top: 14px; display: grid; gap: 10px; }

    .item {
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 10px;
      background: color-mix(in srgb, var(--surface), transparent 10%);
    }

    .k { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .v { margin-top: 4px; font-size: 12px; line-height: 1.5; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      border-radius: 999px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 8px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn.primary {
      background: color-mix(in srgb, var(--accent), transparent 82%);
      border-color: color-mix(in srgb, var(--accent), transparent 55%);
      color: var(--accent);
    }

    .list-links { display: grid; gap: 8px; }

    .list-links a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .footer {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
      padding: 14px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
    }

    .footer a { color: var(--accent); text-decoration: none; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      width: min(100%, 760px);
      background: var(--surface-2);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      border: 1px solid var(--line);
      border-bottom: none;
      padding: 16px;
      max-height: 90vh;
      overflow: auto;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 1px;
    }

    .close-btn {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
    }

    .form { display: grid; gap: 10px; }

    label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }

    input, textarea {
      width: 100%;
      background: color-mix(in srgb, var(--surface), transparent 15%);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 10px;
      padding: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      outline: none;
    }

    textarea { min-height: 90px; resize: vertical; }

    .u-status { min-height: 16px; font-size: 10px; margin-top: 4px; letter-spacing: 0.5px; }
    .u-status.ok { color: var(--ok); }
    .u-status.bad { color: var(--bad); }

    .save-btn {
      border: none;
      border-radius: 11px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent), #fff 22%), var(--accent));
      color: #0f110f;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
      font-size: 20px;
      padding: 10px;
      cursor: pointer;
      margin-top: 4px;
    }

    .bottom-nav {
      position: fixed;
      top: auto;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(10px + env(safe-area-inset-bottom));
      width: min(100% - 16px, 500px);
      z-index: 30;
      background: color-mix(in srgb, var(--surface), #0e1011 25%);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px;
    }

    .bottom-nav a {
      text-decoration: none;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border-radius: 11px;
      color: var(--muted);
      padding: 7px 4px;
      font-size: 9px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
    }

    .bottom-nav a.active {
      background: color-mix(in srgb, var(--accent), transparent 84%);
      color: var(--accent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent), transparent 70%) inset;
    }

    .nav-ico { font-size: 13px; line-height: 1; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(88px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      border-radius: 12px;
      padding: 10px 14px;
      background: #2effa5;
      color: #08110c;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 1.5px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s;
      z-index: 60;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <nav>
    <a href="dashboard.html" class="nav-logo">GYM<span>.</span>DIARY</a>
    <button class="nav-btn" onclick="Auth.logout()">Logout</button>
  </nav>

  <main>
    <section class="panel">
      <div class="profile-head">
        <img id="view-photo" class="photo" src="https://placehold.co/120x120/111417/e8ff00?text=GYM" alt="Profile" />
        <div>
          <div id="view-name" class="name">Profile</div>
          <div id="view-email" class="sub">-</div>
          <div class="actions">
            <button class="btn primary" onclick="openEdit()">✎ Edit Profile</button>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="item">
          <div class="k">Motivation</div>
          <div id="view-note" class="v">Set your reason. Stay consistent.</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="list-links">
        <a href="settings.html"><span>Settings</span><span>›</span></a>
        <a href="about.html"><span>About</span><span>›</span></a>
        <a href="terms.html"><span>Terms & Conditions</span><span>›</span></a>
        <a href="privacy.html"><span>Privacy Policy</span><span>›</span></a>
      </div>
    </section>

    <section class="footer">
      <div>Developer Links:</div>
      <div>
        <a href="https://mycook-droid.github.io/Zishan_droid/" target="_blank" rel="noopener">Portfolio</a>
        ·
        <a href="https://github.com/mycook_droid" target="_blank" rel="noopener">GitHub</a>
      </div>
      <div style="margin-top:6px;">
        <a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="about.html">About</a>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="edit-overlay" onclick="closeOnOverlay(event)">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">Edit Profile</div>
        <button class="close-btn" onclick="closeEdit()">✕</button>
      </div>

      <form class="form" onsubmit="saveProfile(event)">
        <div>
          <label>Username</label>
          <input id="edit-username" required oninput="checkUsernameLive()" />
          <div id="username-status" class="u-status"></div>
        </div>

        <div>
          <label>Email</label>
          <input id="edit-email" type="email" required />
        </div>

        <div>
          <label>Photo URL</label>
          <input id="edit-photo" placeholder="https://..." />
        </div>

        <div>
          <label>Gym Motivation Note</label>
          <textarea id="edit-note" maxlength="500"></textarea>
        </div>

        <button class="save-btn" id="edit-save-btn" type="submit">Save Changes</button>
      </form>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><span class="nav-ico">🏋</span><span>Today</span></a>
    <a href="splits.html"><span class="nav-ico">📋</span><span>Splits</span></a>
    <a href="analytics.html"><span class="nav-ico">📈</span><span>Analytics</span></a>
    <a href="profile.html" class="active"><span class="nav-ico">👤</span><span>Profile</span></a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/static/api.js"></script>
  <script>
    requireAuth();

    let currentUser = null;
    let usernameAvailable = true;

    function showToast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.background = isError ? "#ff5f5f" : "#2effa5";
      t.style.color = isError ? "#fff" : "#08110c";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    function syncView() {
      if (!currentUser) return;
      document.getElementById("view-name").textContent = currentUser.username || "Profile";
      document.getElementById("view-email").textContent = currentUser.email || "";
      document.getElementById("view-note").textContent = currentUser.motivation_note || "No note yet. Add your mission.";
      document.getElementById("view-photo").src = currentUser.photo_url || "https://placehold.co/120x120/111417/e8ff00?text=GYM";
    }

    async function loadProfile() {
      const res = await Auth.me();
      if (!res.ok) {
        showToast("Failed to load profile", true);
        return;
      }
      currentUser = res.data.user;
      syncView();
    }

    function openEdit() {
      if (!currentUser) return;
      document.getElementById("edit-username").value = currentUser.username || "";
      document.getElementById("edit-email").value = currentUser.email || "";
      document.getElementById("edit-photo").value = currentUser.photo_url || "";
      document.getElementById("edit-note").value = currentUser.motivation_note || "";
      document.getElementById("username-status").textContent = "";
      usernameAvailable = true;
      document.getElementById("edit-overlay").classList.add("open");
    }

    function closeEdit() {
      document.getElementById("edit-overlay").classList.remove("open");
    }

    function closeOnOverlay(e) {
      if (e.target === document.getElementById("edit-overlay")) closeEdit();
    }

    let usernameTimer = null;
    function checkUsernameLive() {
      clearTimeout(usernameTimer);
      usernameTimer = setTimeout(async () => {
        const input = document.getElementById("edit-username").value.trim().toLowerCase();
        const status = document.getElementById("username-status");

        if (!input) {
          usernameAvailable = false;
          status.className = "u-status bad";
          status.textContent = "Username is required";
          return;
        }

        if (currentUser && input === (currentUser.username || "").toLowerCase()) {
          usernameAvailable = true;
          status.className = "u-status ok";
          status.textContent = `@${input} is your current username`;
          return;
        }

        const res = await Auth.checkUsername(input);
        if (!res.ok) {
          usernameAvailable = false;
          status.className = "u-status bad";
          status.textContent = "Could not validate username";
          return;
        }

        usernameAvailable = !!res.data.available;
        if (usernameAvailable) {
          status.className = "u-status ok";
          status.textContent = `@${input} is available`;
        } else {
          status.className = "u-status bad";
          status.textContent = `@${input} is not available`;
        }
      }, 250);
    }

    async function saveProfile(e) {
      e.preventDefault();
      if (!usernameAvailable) {
        showToast("Please choose an available username", true);
        return;
      }

      const btn = document.getElementById("edit-save-btn");
      btn.disabled = true;
      btn.textContent = "Saving...";

      const updates = {
        username: document.getElementById("edit-username").value.trim(),
        email: document.getElementById("edit-email").value.trim(),
        photo_url: document.getElementById("edit-photo").value.trim(),
        motivation_note: document.getElementById("edit-note").value.trim(),
      };

      const res = await Auth.updateProfile(updates);
      if (res.ok) {
        currentUser = res.data.user;
        syncView();
        closeEdit();
        showToast("Profile updated");
      } else {
        showToast(res.data.error || "Update failed", true);
      }

      btn.disabled = false;
      btn.textContent = "Save Changes";
    }

    loadProfile();
  </script>
</body>
</html>
