<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splits — Gym Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
  --bg:        #070809;
  --bg-2:      #0f1113;
  --surface:   rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.08);
  --border-hi: rgba(232,255,0,0.35);
  --text:      #eef1e8;
  --muted:     #6b7267;
  --accent:    #d6f500;
  --accent-2:  rgba(214,245,0,0.12);
  --green:     #00e87a;
  --red:       #ff4d4d;
}

    html { color-scheme: dark; }
    body { min-height: 100vh; color: var(--text); font-family: 'Space Grotesk', sans-serif; background: var(--bg); padding-bottom: calc(80px + env(safe-area-inset-bottom)); position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.6; }
    a { color: inherit; }
    nav { position: sticky; top: 0; z-index: 50; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(7,8,9,0.85); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
    .nav-logo { text-decoration: none; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; line-height: 1; }
    .nav-logo span { color: var(--accent); }
    .nav-right, .nav-actions { display: flex; gap: 10px; align-items: center; }
    .nav-btn { border: 1px solid var(--border); background: var(--surface); color: var(--muted); border-radius: 10px; padding: 7px 13px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.2s; text-decoration: none; cursor: pointer; }
    .nav-btn:hover { border-color: var(--border-hi); color: var(--accent); }
    main { position: relative; z-index: 1; width: min(100%, 600px); margin: 0 auto; padding: 20px 16px 24px; display: grid; gap: 16px; }
    main > section, main > div.card { animation: cardIn 0.4s cubic-bezier(0.22,1,0.36,1) both; }
    main > section:nth-child(1), main > div.card:nth-child(1) { animation-delay: 0s; }
    main > section:nth-child(2), main > div.card:nth-child(2) { animation-delay: 0.07s; }
    main > section:nth-child(3), main > div.card:nth-child(3) { animation-delay: 0.14s; }
    main > section:nth-child(4), main > div.card:nth-child(4) { animation-delay: 0.21s; }
    .card, .panel, .section, .hero, #workout-content, .footer, .legal-footer, .app-footer, .rest-card, .no-split, .item, .stat, .line-wrap, .split-card, .preset-card, .empty, .builder-note, .prev-session, .list div, .list-links a { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; transition: border-color 0.2s, transform 0.18s; }
    .card:hover, .panel:hover, .section:hover, .hero:hover, #workout-content:hover, .footer:hover, .legal-footer:hover, .app-footer:hover, .rest-card:hover, .no-split:hover, .item:hover, .stat:hover, .line-wrap:hover, .split-card:hover, .preset-card:hover, .empty:hover, .builder-note:hover, .prev-session:hover, .list div:hover, .list-links a:hover { border-color: var(--border-hi); transform: translateY(-2px); }
    .title, .hero-title, .name, .modal-title, .preset-name, .split-name, .ex-name, .stat-value, .rest-title, h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
    .logo, .date-day { font-family: 'Bebas Neue', sans-serif; }
    .sub, .section-title, .k, .tagline, .date-label, .date-split, .hero-sub, .stat-label, .bar-day, .bar-val, .modal-muscle, .ex-meta, .set-num, .set-input-label, .split-badge, .pitch-label, .u-status, .legal-footer, .app-footer, .day-name { font-family: 'Space Mono', monospace; }
    label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 7px; }
    input, select, textarea { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 15px; padding: 13px 14px; width: 100%; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--border-hi); box-shadow: 0 0 0 3px rgba(214,245,0,0.08); }
    .btn, .btn-yellow, .builder-btn, .save-btn, .btn-save { background: var(--accent); color: #080a05; border: none; border-radius: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; padding: 14px; width: 100%; cursor: pointer; transition: filter 0.2s, transform 0.12s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn:hover, .btn-yellow:hover, .builder-btn:hover, .save-btn:hover, .btn-save:hover { filter: brightness(1.08); }
    .btn:active, .btn-yellow:active, .builder-btn:active, .save-btn:active, .btn-save:active { transform: scale(0.97); }
    .btn:disabled, .builder-btn:disabled, .save-btn:disabled, .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.primary, .btn-activate, .btn-add-set, .close-btn, .modal-close { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 9px 14px; cursor: pointer; transition: all 0.2s; width: auto; }
    .btn.primary:hover, .btn-activate:hover, .btn-add-set:hover, .close-btn:hover, .modal-close:hover { border-color: var(--border-hi); color: var(--text); }
    .exercise-item { padding: 18px 16px; display: flex; align-items: center; gap: 14px; border-radius: 16px; cursor: pointer; justify-content: space-between; }
    .exercise-item:active { transform: scale(0.98); transition: transform 0.08s; }
    .skeleton { border-radius: 14px; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.6s ease-in-out infinite; }
    .toast { position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 14px; padding: 12px 20px; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 1px; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.22,1,0.36,1); z-index: 200; border-left: 3px solid var(--green); }
    .toast.error { border-left-color: var(--red); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(7,8,9,0.92); backdrop-filter: blur(28px); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); }
    .bottom-nav a { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 8px 4px; border-radius: 14px; color: var(--muted); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s, background 0.2s; }
    .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .bottom-nav a.active { color: var(--accent); background: var(--accent-2); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (min-width: 720px) { main { padding: 24px 20px 28px; } }
    .panel, .footer, .legal-footer { padding: 20px; } .title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 15vw, 68px); letter-spacing: 2px; line-height: .9; } .sub { margin-top: 8px; color: var(--muted); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; } .text { margin-top: 14px; line-height: 1.8; color: var(--text); font-size: 15px; } .list { margin-top: 16px; display: grid; gap: 10px; } .list div { padding: 14px; color: var(--text); } .list strong, .footer a, .text a, .legal-footer a { color: var(--accent); } .muted { color: var(--muted); } .legal-footer, .footer { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); line-height: 1.8; }
    .hero,.section,.app-footer{padding:20px}.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(54px,16vw,80px);letter-spacing:2px;line-height:.9}.hero-sub,.section-title,.preset-key,.day-name,.builder-note,.empty{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}.split-card,.preset-card{padding:16px;margin-bottom:10px}.split-card.active{border-color:var(--border-hi)}.split-name{font-size:18px}.split-badge{display:inline-block;margin-left:8px;padding:4px 8px;border-radius:999px;font-size:9px;letter-spacing:1px}.split-badge.active-badge{background:var(--accent);color:#080a05}.split-badge.preset-badge{border:1px solid var(--border);color:var(--muted)}.split-actions{display:flex;gap:8px;align-items:center}.btn-delete{border:1px solid rgba(255,77,77,.22);background:rgba(255,77,77,.08);color:#ffb5b5;width:34px;height:34px;border-radius:10px;cursor:pointer}.preset-grid,.days-grid{display:grid;gap:12px}.preset-name{font-size:28px}.btn-use{margin-top:14px;display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--accent);text-transform:uppercase}.builder-form{display:grid;gap:14px}.day-row{display:grid;grid-template-columns:minmax(88px,1fr) 1fr;gap:10px;align-items:center}.inline-check{display:flex;align-items:center;gap:10px}.inline-check input{width:18px;height:18px;accent-color:var(--accent)}.inline-check span{font-family:'Space Grotesk',sans-serif;color:var(--text);font-size:14px;text-transform:none;letter-spacing:0}.builder-note,.empty{text-align:center}.app-footer{width:min(100%,600px);margin:0 auto;text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);background:transparent;border:none}.app-footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
  <nav>
    <a href="dashboard.html" class="nav-logo">GYM<span>.</span>DIARY</a>
    <button class="nav-btn" onclick="Auth.logout()">Logout</button>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-title">Build Your Week</div>
      <p class="hero-sub">Pick a library split or create your own weekly structure in under a minute.</p>
    </section>

    <section class="section">
      <p class="section-title">My Splits</p>
      <div id="my-splits-list">
        <div class="skeleton" style="height:68px; margin-bottom:10px;"></div>
        <div class="skeleton" style="height:68px; margin-bottom:10px; opacity:0.6;"></div>
        <div class="skeleton" style="height:68px; opacity:0.35;"></div>
      </div>
    </section>

    <section class="section">
      <p class="section-title">Create Custom Split</p>
      <form class="builder-form" onsubmit="createCustomSplit(event)">
        <div>
          <label>Split Name</label>
          <input id="custom-split-name" type="text" placeholder="Hybrid Strength" required />
        </div>

        <div class="days-grid" id="days-grid"></div>

        <label class="inline-check">
          <input id="autofill-exercises" type="checkbox" checked />
          <span>Auto-fill starter exercises</span>
        </label>

        <button class="builder-btn" type="submit" id="custom-create-btn">Create Split</button>

        <div class="builder-note">
          This keeps setup simple: create your week now, then refine exercises anytime.
        </div>
      </form>
    </section>

    <section class="section">
      <p class="section-title">Add From Library</p>
      <div class="preset-grid" id="preset-grid">
        <div class="skeleton" style="height:68px; margin-bottom:10px; grid-column:1/-1;"></div>
        <div class="skeleton" style="height:68px; margin-bottom:10px; opacity:0.6; grid-column:1/-1;"></div>
        <div class="skeleton" style="height:68px; opacity:0.35; grid-column:1/-1;"></div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="about.html">About</a>
  </footer>
  <nav class="bottom-nav">
    <a href="dashboard.html">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Today
    </a>
    <a href="splits.html" class="active">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Splits
    </a>
    <a href="analytics.html">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Stats
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/static/api.js"></script>
  <script>
    requireAuth();

    const WEEK_DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const DAY_LABELS = ["Rest", "Push", "Pull", "Legs", "Upper", "Lower", "Full Body", "Chest", "Back", "Shoulders", "Arms"];

    const STARTER_EXERCISES = {
      Push: [
        { name: "Bench Press", muscle_group: "Chest", default_sets: 3 },
        { name: "Overhead Press", muscle_group: "Shoulders", default_sets: 3 },
        { name: "Tricep Pushdown", muscle_group: "Triceps", default_sets: 3 }
      ],
      Pull: [
        { name: "Barbell Row", muscle_group: "Back", default_sets: 3 },
        { name: "Lat Pulldown", muscle_group: "Back", default_sets: 3 },
        { name: "Barbell Curl", muscle_group: "Biceps", default_sets: 3 }
      ],
      Legs: [
        { name: "Squat", muscle_group: "Quads", default_sets: 4 },
        { name: "Romanian Deadlift", muscle_group: "Hamstrings", default_sets: 3 },
        { name: "Leg Press", muscle_group: "Quads", default_sets: 3 }
      ],
      Upper: [
        { name: "Incline Bench Press", muscle_group: "Chest", default_sets: 3 },
        { name: "Seated Row", muscle_group: "Back", default_sets: 3 },
        { name: "Lateral Raise", muscle_group: "Shoulders", default_sets: 3 }
      ],
      Lower: [
        { name: "Back Squat", muscle_group: "Quads", default_sets: 4 },
        { name: "Leg Curl", muscle_group: "Hamstrings", default_sets: 3 },
        { name: "Calf Raise", muscle_group: "Calves", default_sets: 4 }
      ],
      "Full Body": [
        { name: "Goblet Squat", muscle_group: "Legs", default_sets: 3 },
        { name: "Dumbbell Press", muscle_group: "Chest", default_sets: 3 },
        { name: "Row", muscle_group: "Back", default_sets: 3 }
      ],
      Chest: [
        { name: "Bench Press", muscle_group: "Chest", default_sets: 4 },
        { name: "Incline Dumbbell Press", muscle_group: "Chest", default_sets: 3 },
        { name: "Cable Fly", muscle_group: "Chest", default_sets: 3 }
      ],
      Back: [
        { name: "Deadlift", muscle_group: "Back", default_sets: 4 },
        { name: "Pull Ups", muscle_group: "Back", default_sets: 3 },
        { name: "Seated Cable Row", muscle_group: "Back", default_sets: 3 }
      ],
      Shoulders: [
        { name: "Overhead Press", muscle_group: "Shoulders", default_sets: 4 },
        { name: "Lateral Raise", muscle_group: "Shoulders", default_sets: 4 },
        { name: "Face Pull", muscle_group: "Rear Delts", default_sets: 3 }
      ],
      Arms: [
        { name: "Barbell Curl", muscle_group: "Biceps", default_sets: 4 },
        { name: "Skull Crushers", muscle_group: "Triceps", default_sets: 4 },
        { name: "Hammer Curl", muscle_group: "Biceps", default_sets: 3 }
      ]
    };

    function renderDayBuilder() {
      const daysGrid = document.getElementById('days-grid');
      const defaults = ["Push", "Pull", "Legs", "Rest", "Upper", "Lower", "Rest"];
      daysGrid.innerHTML = WEEK_DAYS.map((day, index) => `
        <div class="day-row">
          <div class="day-name">${day}</div>
          <select id="day-label-${index}">
            ${DAY_LABELS.map(label => `<option value="${label}" ${label === defaults[index] ? 'selected' : ''}>${label}</option>`).join('')}
          </select>
        </div>
      `).join('');
    }

    async function init() {
      renderDayBuilder();
      await Promise.all([loadMySplits(), loadPresets()]);
    }

    function escapeForOnclick(text) {
      return (text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    async function loadMySplits() {
      const res = await Splits.getMySplits();
      const container = document.getElementById('my-splits-list');

      if (!res.ok || !res.data.splits?.length) {
        container.innerHTML = `<div class="empty">No splits yet. Pick from library or create your own above.</div>`;
        return;
      }

      container.innerHTML = res.data.splits.map(s => {
        const safeName = escapeForOnclick(s.name);
        return `
          <div class="split-card ${s.is_active ? 'active' : ''}">
            <div>
              <span class="split-name">${s.name}</span>
              ${s.is_active ? `<span class="split-badge active-badge">Active</span>` : ''}
              ${s.is_preset ? `<span class="split-badge preset-badge">Preset</span>` : ''}
            </div>
            <div class="split-actions">
              ${!s.is_active ? `<button class="btn-activate" onclick="activateSplit(${s.id})">Activate</button>` : ''}
              <button class="btn-delete" onclick="deleteSplit(${s.id}, '${safeName}')">✕</button>
            </div>
          </div>`;
      }).join('');
    }

    async function loadPresets() {
      const res = await Splits.getPresets();
      const grid = document.getElementById('preset-grid');

      if (!res.ok) { grid.innerHTML = `<div class="empty">Failed to load presets.</div>`; return; }

      grid.innerHTML = res.data.presets.map(p => `
        <div class="preset-card" onclick="usePreset('${p.key}', this)">
          <div class="preset-name">${p.name}</div>
          <div class="preset-key">${p.key.replace('_', ' ')}</div>
          <span class="btn-use">+ Add to my splits</span>
        </div>`).join('');
    }

    function buildCustomDays(withStarters) {
      return WEEK_DAYS.map((day, index) => {
        const label = document.getElementById(`day-label-${index}`).value;
        const exercises = (withStarters && STARTER_EXERCISES[label]) ? STARTER_EXERCISES[label] : [];
        return {
          day_name: day,
          day_label: label,
          exercises
        };
      });
    }

    async function createCustomSplit(e) {
      e.preventDefault();

      const nameInput = document.getElementById('custom-split-name');
      const createBtn = document.getElementById('custom-create-btn');
      const withStarters = document.getElementById('autofill-exercises').checked;

      const name = nameInput.value.trim();
      if (!name) {
        showToast('Split name required', true);
        return;
      }

      createBtn.disabled = true;
      createBtn.textContent = 'Creating...';

      const splitData = {
        name,
        days: buildCustomDays(withStarters)
      };

      const res = await Splits.createCustom(splitData);

      if (res.ok) {
        showToast('Custom split created');
        nameInput.value = '';
        await loadMySplits();
      } else {
        showToast(res.data.error || 'Could not create split', true);
      }

      createBtn.disabled = false;
      createBtn.textContent = 'Create Split';
    }

    async function activateSplit(id) {
      const res = await Splits.activate(id);
      if (res.ok) { showToast('Split activated'); loadMySplits(); }
      else showToast('Error', true);
    }

    async function deleteSplit(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      const res = await Splits.deleteSplit(id);
      if (res.ok) { showToast('Split deleted'); loadMySplits(); }
      else showToast('Error', true);
    }

    async function usePreset(key, el) {
      el.style.opacity = '0.5';
      el.style.pointerEvents = 'none';
      const res = await Splits.usePreset(key);
      if (res.ok) { showToast(`${res.data.split.name} added!`); loadMySplits(); }
      else { showToast(res.data.error || 'Error', true); }
      el.style.opacity = '1';
      el.style.pointerEvents = 'all';
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? 'var(--danger)' : 'var(--success)';
      t.style.color = isError ? '#fff' : '#0f120f';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
