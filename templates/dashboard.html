<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today — Gym Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #050607;
      --bg-1: #0d1012;
      --bg-2: #15181b;
      --surface: rgba(18, 21, 23, 0.9);
      --surface-soft: rgba(25, 29, 33, 0.88);
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(232, 255, 0, 0.42);
      --text: #f3f6ee;
      --muted: #8b9285;
      --accent: #e8ff00;
      --done: #1ef7a2;
      --error: #ff5f5f;
    }

    :root[data-theme="light"] {
      --bg: #f4f6ef;
      --bg-0: #f4f6ef;
      --bg-1: #e9ece4;
      --bg-2: #dde2d8;
      --text: #121512;
      --muted: #4f584c;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-soft: rgba(244, 247, 238, 0.95);
      --line: rgba(17, 19, 17, 0.15);
    }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      background:
        radial-gradient(circle at 8% 14%, rgba(232, 255, 0, 0.08), transparent 24%),
        radial-gradient(circle at 92% 8%, rgba(232, 255, 0, 0.07), transparent 20%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 40%, var(--bg-2) 100%);
      padding-bottom: calc(92px + env(safe-area-inset-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232, 255, 0, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232, 255, 0, 0.02) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      background: rgba(7, 8, 9, 0.78);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 3px;
      color: var(--text);
      line-height: 1;
    }

    .nav-logo span { color: var(--accent); }

    .nav-right { display: flex; gap: 8px; align-items: center; }

    .nav-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.02);
      color: #d3d9cd;
      border-radius: 999px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 12px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      border-color: var(--line-strong);
      color: var(--accent);
      transform: translateY(-1px);
    }

    main {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 16px 24px;
      display: grid;
      gap: 16px;
    }

    .date-header {
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px 18px;
      background: linear-gradient(160deg, rgba(24, 27, 30, 0.9), rgba(14, 16, 18, 0.88));
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.35);
      animation: rise 500ms ease;
    }

    .date-day {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 16vw, 74px);
      line-height: 0.9;
      letter-spacing: 2px;
    }

    .date-label {
      margin-top: 7px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .date-split {
      margin-top: 4px;
      font-size: 11px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--muted);
    }

    #workout-content {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(12, 14, 16, 0.8);
      min-height: 200px;
      animation: rise 620ms ease;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9aa293;
      margin-bottom: 12px;
    }

    .exercise-list { display: flex; flex-direction: column; gap: 10px; }

    .exercise-item {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(27, 30, 33, 0.95), rgba(18, 21, 24, 0.94));
      padding: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: transform 0.15s, border-color 0.2s;
    }

    .exercise-item:hover {
      transform: translateY(-1px);
      border-color: rgba(232, 255, 0, 0.4);
    }

    .exercise-item.done {
      border-color: rgba(30, 247, 162, 0.5);
      box-shadow: 0 0 0 1px rgba(30, 247, 162, 0.17) inset;
    }

    .ex-left { flex: 1; min-width: 0; }

    .ex-name {
      font-size: 14px;
      letter-spacing: 0.4px;
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ex-meta {
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: 1px;
      color: #91998c;
      text-transform: uppercase;
    }

    .ex-sets-done,
    .ex-sets-todo {
      font-size: 11px;
      letter-spacing: 1px;
      text-align: right;
      white-space: nowrap;
    }

    .ex-sets-done { color: var(--done); }
    .ex-sets-todo { color: #8e9588; }

    .rest-card,
    .no-split {
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 26px 18px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .rest-icon { font-size: 44px; }

    .rest-title {
      margin-top: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      letter-spacing: 2px;
      color: #98a08f;
    }

    .no-split p {
      color: #9da495;
      font-size: 12px;
      line-height: 1.7;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .btn-yellow {
      display: inline-block;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #f2ff63, #e0f800);
      color: #0d0f0d;
      text-decoration: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      padding: 10px 24px;
      transition: filter 0.2s;
    }

    .btn-yellow:hover { filter: brightness(1.06); }

    .skeleton {
      height: 72px;
      border-radius: 12px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #1a1d20 25%, #24292c 50%, #1a1d20 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 45;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      background: rgba(4, 5, 6, 0.82);
      backdrop-filter: blur(5px);
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      width: min(100%, 760px);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-bottom: none;
      background: linear-gradient(170deg, rgba(21, 24, 27, 0.97), rgba(14, 16, 18, 0.98));
      padding: 20px 16px calc(24px + env(safe-area-inset-bottom));
      transform: translateY(24px);
      transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      line-height: 0.95;
      letter-spacing: 1px;
    }

    .modal-muscle {
      margin-top: 5px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .modal-close {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.02);
      color: #d9ded0;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-close:hover {
      color: var(--accent);
      border-color: var(--line-strong);
    }

    .prev-session {
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      padding: 11px 12px;
      color: #a9b09f;
      line-height: 1.65;
      letter-spacing: 0.7px;
      font-size: 11px;
      margin-bottom: 14px;
    }

    .prev-session strong { color: var(--accent); }

    .sets-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) minmax(0, 1fr) 32px;
      gap: 8px;
      align-items: center;
    }

    .set-num {
      text-align: center;
      font-size: 10px;
      letter-spacing: 1px;
      color: #98a08f;
    }

    .set-input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      text-align: center;
      outline: none;
      padding: 10px 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .set-input:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 3px rgba(232, 255, 0, 0.1);
    }

    .set-input::placeholder { color: #697066; }

    .set-input-label {
      margin-top: 3px;
      text-align: center;
      font-size: 9px;
      letter-spacing: 1px;
      color: #7f8678;
      text-transform: uppercase;
    }

    .set-delete {
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 95, 95, 0.1);
      color: #ff9f9f;
      cursor: pointer;
      font-size: 15px;
      transition: transform 0.15s, background 0.2s;
    }

    .set-delete:hover {
      transform: scale(1.05);
      background: rgba(255, 95, 95, 0.2);
    }

    .btn-add-set,
    .btn-save {
      width: 100%;
      border-radius: 12px;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add-set {
      border: 1px dashed rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.02);
      color: #c8cec0;
      text-transform: uppercase;
      letter-spacing: 1.7px;
      font-size: 11px;
      padding: 11px;
    }

    .btn-add-set:hover {
      border-color: var(--line-strong);
      color: var(--accent);
    }

    .btn-save {
      border: none;
      margin-top: 8px;
      background: linear-gradient(180deg, #f2ff66 0%, #dff700 100%);
      color: #0d0e0d;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 3px;
      padding: 11px;
    }

    .btn-save:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-save:hover:not(:disabled) { filter: brightness(1.06); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(88px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      max-width: calc(100vw - 26px);
      text-align: center;
      padding: 11px 14px;
      border-radius: 12px;
      background: var(--done);
      color: #08100b;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      z-index: 50;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .bottom-nav {
      position: fixed;
      top: auto;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(10px + env(safe-area-inset-bottom));
      width: min(100% - 16px, 500px);
      z-index: 35;
      background: rgba(13, 15, 17, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px;
    }

    .bottom-nav a {
      text-decoration: none;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border-radius: 11px;
      color: #aab1a5;
      padding: 7px 4px;
      font-size: 9px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      transition: all 0.18s;
    }

    .nav-ico {
      font-size: 13px;
      line-height: 1;
      opacity: 0.92;
    }

    .bottom-nav a.active {
      background: rgba(232, 255, 0, 0.14);
      color: var(--accent);
      box-shadow: 0 0 0 1px rgba(232, 255, 0, 0.24) inset;
    }

    .app-footer {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 0 16px 10px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 1px;
      color: #8d9588;
    }

    .app-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .bottom-nav {
        border-radius: 14px;
        border-color: rgba(255, 255, 255, 0.12);
        background: rgba(10, 12, 13, 0.9);
        backdrop-filter: blur(8px);
      }
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 740px) {
      nav { padding: 16px 20px; }
      main { padding: 24px 20px; }
      .modal { padding: 24px 24px 30px; }
      .set-row { grid-template-columns: 38px minmax(0, 1fr) minmax(0, 1fr) 36px; }
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">GYM<span>.</span>DIARY</div>
    <div class="nav-right">
      <a href="splits.html" class="nav-btn">Splits</a>
      <button class="nav-btn" onclick="Auth.logout()">Logout</button>
    </div>
  </nav>

  <main>
    <section class="date-header">
      <div class="date-day" id="date-day">—</div>
      <div class="date-label" id="date-label">Loading...</div>
      <div class="date-split" id="date-split"></div>
    </section>

    <section id="workout-content">
      <div class="skeleton"></div>
      <div class="skeleton" style="opacity:0.58"></div>
      <div class="skeleton" style="opacity:0.36"></div>
    </section>
  </main>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-ex-name">—</div>
          <div class="modal-muscle" id="modal-ex-muscle"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div id="prev-session-box" class="prev-session" style="display:none"></div>

      <div class="sets-container" id="sets-container"></div>
      <button class="btn-add-set" onclick="addSetRow()">+ Add Set</button>
      <button class="btn-save" id="save-btn" onclick="saveSets()">Save Session</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <footer class="app-footer">
    <a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="about.html">About</a>
  </footer>
  <nav class="bottom-nav">
    <a href="dashboard.html" class="active"><span class="nav-ico">🏋</span><span>Today</span></a>
    <a href="splits.html"><span class="nav-ico">📋</span><span>Splits</span></a>
    <a href="analytics.html"><span class="nav-ico">📈</span><span>Analytics</span></a>
    <a href="profile.html"><span class="nav-ico">👤</span><span>Profile</span></a>
  </nav>

  <script src="/static/api.js"></script>
  <script>
    requireAuth();

    let todayData = null;
    let currentExercise = null;

    async function init() {
      const now = new Date();
      document.getElementById('date-day').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });

      const res = await Logs.getToday();

      if (!res.ok) {
        if (res.data.error?.includes('No active split')) {
          renderNoSplit();
        }
        return;
      }

      todayData = res.data;

      if (todayData.is_rest) {
        renderRestDay();
        return;
      }

      document.getElementById('date-label').textContent = todayData.day_label + ' Day';
      document.getElementById('date-split').textContent = todayData.split_name;
      renderExercises(todayData.exercises);
    }

    function renderNoSplit() {
      document.getElementById('date-label').textContent = 'No active split';
      document.getElementById('workout-content').innerHTML = `
        <div class="no-split">
          <p>You don't have an active split yet.<br>Set one up to start tracking.</p>
          <a href="splits.html" class="btn-yellow">Setup Split</a>
        </div>`;
    }

    function renderRestDay() {
      document.getElementById('date-label').textContent = 'Rest Day';
      document.getElementById('date-split').textContent = todayData.split_name || '';
      document.getElementById('workout-content').innerHTML = `
        <div class="rest-card">
          <div class="rest-icon">💤</div>
          <div class="rest-title">Rest & Recover</div>
        </div>`;
    }

    function renderExercises(exercises) {
      const html = exercises.map(ex => {
        const loggedCount = ex.logged_sets?.length || 0;
        const isDone = loggedCount >= ex.default_sets;
        return `
          <div class="exercise-item ${isDone ? 'done' : ''}" onclick="openModal(${ex.id})">
            <div class="ex-left">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-meta">${ex.muscle_group || ''} · ${ex.default_sets} sets</div>
            </div>
            ${isDone
              ? `<div class="ex-sets-done">✓ ${loggedCount} sets</div>`
              : loggedCount > 0
                ? `<div class="ex-sets-done">${loggedCount}/${ex.default_sets} sets</div>`
                : `<div class="ex-sets-todo">${ex.default_sets} sets</div>`
            }
          </div>`;
      }).join('');

      document.getElementById('workout-content').innerHTML = `
        <p class="section-title">Today's Exercises</p>
        <div class="exercise-list">${html}</div>`;
    }

    function openModal(exerciseId) {
      currentExercise = todayData.exercises.find(e => e.id === exerciseId);
      if (!currentExercise) return;

      document.getElementById('modal-ex-name').textContent = currentExercise.name;
      document.getElementById('modal-ex-muscle').textContent = currentExercise.muscle_group || '';

      const sets = currentExercise.logged_sets?.length
        ? currentExercise.logged_sets
        : Array.from({ length: currentExercise.default_sets }, (_, i) => ({
            set_number: i + 1, reps: '', weight: ''
          }));

      renderSetRows(sets);
      loadPreviousSession(exerciseId);
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      currentExercise = null;
    }

    function closeModalOnOverlay(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    function renderSetRows(sets) {
      const container = document.getElementById('sets-container');
      container.innerHTML = sets.map((s, i) => `
        <div class="set-row" id="set-row-${i}">
          <div class="set-num">S${i + 1}</div>
          <div>
            <input class="set-input" type="number" placeholder="kg" min="0" step="0.5"
              value="${s.weight || ''}" id="weight-${i}" />
            <div class="set-input-label">kg</div>
          </div>
          <div>
            <input class="set-input" type="number" placeholder="reps" min="1"
              value="${s.reps || ''}" id="reps-${i}" />
            <div class="set-input-label">reps</div>
          </div>
          <button class="set-delete" onclick="removeSetRow(${i})">✕</button>
        </div>`).join('');
    }

    function addSetRow() {
      const container = document.getElementById('sets-container');
      const count = container.children.length;
      const div = document.createElement('div');
      div.className = 'set-row';
      div.id = `set-row-${count}`;
      div.innerHTML = `
        <div class="set-num">S${count + 1}</div>
        <div>
          <input class="set-input" type="number" placeholder="kg" min="0" step="0.5" id="weight-${count}" />
          <div class="set-input-label">kg</div>
        </div>
        <div>
          <input class="set-input" type="number" placeholder="reps" min="1" id="reps-${count}" />
          <div class="set-input-label">reps</div>
        </div>
        <button class="set-delete" onclick="removeSetRow(${count})">✕</button>`;
      container.appendChild(div);
    }

    function removeSetRow(index) {
      const row = document.getElementById(`set-row-${index}`);
      if (row) row.remove();
      const rows = document.querySelectorAll('.set-row');
      rows.forEach((r, i) => {
        r.id = `set-row-${i}`;
        r.querySelector('.set-num').textContent = `S${i + 1}`;
        r.querySelector('.set-input:first-of-type').id = `weight-${i}`;
        r.querySelector('.set-input:last-of-type').id = `reps-${i}`;
        r.querySelector('.set-delete').setAttribute('onclick', `removeSetRow(${i})`);
      });
    }

    async function loadPreviousSession(exerciseId) {
      const box = document.getElementById('prev-session-box');
      const res = await Logs.getExerciseHistory(exerciseId);
      if (!res.ok || !res.data.history?.length) { box.style.display = 'none'; return; }

      const last = res.data.history[0];
      const summary = last.sets.map(s => `${s.weight}kg×${s.reps}`).join('  ');
      box.style.display = 'block';
      box.innerHTML = `<strong>Last session (${last.date}):</strong><br>${summary}`;
    }

    async function saveSets() {
      const btn = document.getElementById('save-btn');
      const rows = document.querySelectorAll('.set-row');
      const sets = [];

      rows.forEach((_, i) => {
        const weight = parseFloat(document.getElementById(`weight-${i}`)?.value);
        const reps = parseInt(document.getElementById(`reps-${i}`)?.value);
        if (!isNaN(weight) && !isNaN(reps)) {
          sets.push({ set_number: i + 1, reps, weight });
        }
      });

      if (sets.length === 0) { showToast('Enter at least one set', true); return; }

      btn.disabled = true;
      btn.textContent = 'Saving...';

      const res = await Logs.logSets(currentExercise.id, sets);

      if (res.ok) {
        showToast(`${sets.length} sets saved ✓`);
        closeModal();
        init();
      } else {
        showToast('Error saving', true);
        btn.disabled = false;
        btn.textContent = 'Save Session';
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? 'var(--error)' : 'var(--done)';
      t.style.color = isError ? '#fff' : '#08100b';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
