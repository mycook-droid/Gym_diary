<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today — Gym Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
  --bg:        #070809;
  --bg-2:      #0f1113;
  --surface:   rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.08);
  --border-hi: rgba(232,255,0,0.35);
  --text:      #eef1e8;
  --muted:     #6b7267;
  --accent:    #d6f500;
  --accent-2:  rgba(214,245,0,0.12);
  --green:     #00e87a;
  --red:       #ff4d4d;
}

    html { color-scheme: dark; }
    body { min-height: 100vh; color: var(--text); font-family: 'Space Grotesk', sans-serif; background: var(--bg); padding-bottom: calc(80px + env(safe-area-inset-bottom)); position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.6; }
    a { color: inherit; }
    nav { position: sticky; top: 0; z-index: 50; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(7,8,9,0.85); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
    .nav-logo { text-decoration: none; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; line-height: 1; }
    .nav-logo span { color: var(--accent); }
    .nav-right, .nav-actions { display: flex; gap: 10px; align-items: center; }
    .nav-btn { border: 1px solid var(--border); background: var(--surface); color: var(--muted); border-radius: 10px; padding: 7px 13px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.2s; text-decoration: none; cursor: pointer; }
    .nav-btn:hover { border-color: var(--border-hi); color: var(--accent); }
    main { position: relative; z-index: 1; width: min(100%, 600px); margin: 0 auto; padding: 20px 16px 24px; display: grid; gap: 16px; }
    main > section, main > div.card { animation: cardIn 0.4s cubic-bezier(0.22,1,0.36,1) both; }
    main > section:nth-child(1), main > div.card:nth-child(1) { animation-delay: 0s; }
    main > section:nth-child(2), main > div.card:nth-child(2) { animation-delay: 0.07s; }
    main > section:nth-child(3), main > div.card:nth-child(3) { animation-delay: 0.14s; }
    main > section:nth-child(4), main > div.card:nth-child(4) { animation-delay: 0.21s; }
    .card, .panel, .section, .hero, #workout-content, .footer, .legal-footer, .app-footer, .rest-card, .no-split, .item, .stat, .line-wrap, .split-card, .preset-card, .empty, .builder-note, .prev-session, .list div, .list-links a { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; transition: border-color 0.2s, transform 0.18s; }
    .card:hover, .panel:hover, .section:hover, .hero:hover, #workout-content:hover, .footer:hover, .legal-footer:hover, .app-footer:hover, .rest-card:hover, .no-split:hover, .item:hover, .stat:hover, .line-wrap:hover, .split-card:hover, .preset-card:hover, .empty:hover, .builder-note:hover, .prev-session:hover, .list div:hover, .list-links a:hover { border-color: var(--border-hi); transform: translateY(-2px); }
    .title, .hero-title, .name, .modal-title, .preset-name, .split-name, .ex-name, .stat-value, .rest-title, h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
    .logo, .date-day { font-family: 'Bebas Neue', sans-serif; }
    .sub, .section-title, .k, .tagline, .date-label, .date-split, .hero-sub, .stat-label, .bar-day, .bar-val, .modal-muscle, .ex-meta, .set-num, .set-input-label, .split-badge, .pitch-label, .u-status, .legal-footer, .app-footer, .day-name { font-family: 'Space Mono', monospace; }
    label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 7px; }
    input, select, textarea { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 15px; padding: 13px 14px; width: 100%; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--border-hi); box-shadow: 0 0 0 3px rgba(214,245,0,0.08); }
    .btn, .btn-yellow, .builder-btn, .save-btn, .btn-save { background: var(--accent); color: #080a05; border: none; border-radius: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; padding: 14px; width: 100%; cursor: pointer; transition: filter 0.2s, transform 0.12s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn:hover, .btn-yellow:hover, .builder-btn:hover, .save-btn:hover, .btn-save:hover { filter: brightness(1.08); }
    .btn:active, .btn-yellow:active, .builder-btn:active, .save-btn:active, .btn-save:active { transform: scale(0.97); }
    .btn:disabled, .builder-btn:disabled, .save-btn:disabled, .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.primary, .btn-activate, .btn-add-set, .close-btn, .modal-close { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 9px 14px; cursor: pointer; transition: all 0.2s; width: auto; }
    .btn.primary:hover, .btn-activate:hover, .btn-add-set:hover, .close-btn:hover, .modal-close:hover { border-color: var(--border-hi); color: var(--text); }
    .exercise-item { padding: 18px 16px; display: flex; align-items: center; gap: 14px; border-radius: 16px; cursor: pointer; justify-content: space-between; }
    .exercise-item:active { transform: scale(0.98); transition: transform 0.08s; }
    .skeleton { border-radius: 14px; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.6s ease-in-out infinite; }
    .toast { position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 14px; padding: 12px 20px; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 1px; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.22,1,0.36,1); z-index: 200; border-left: 3px solid var(--green); }
    .toast.error { border-left-color: var(--red); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(7,8,9,0.92); backdrop-filter: blur(28px); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); }
    .bottom-nav a { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 8px 4px; border-radius: 14px; color: var(--muted); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s, background 0.2s; }
    .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .bottom-nav a.active { color: var(--accent); background: var(--accent-2); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (min-width: 720px) { main { padding: 24px 20px 28px; } }
    .panel, .footer, .legal-footer { padding: 20px; } .title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 15vw, 68px); letter-spacing: 2px; line-height: .9; } .sub { margin-top: 8px; color: var(--muted); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; } .text { margin-top: 14px; line-height: 1.8; color: var(--text); font-size: 15px; } .list { margin-top: 16px; display: grid; gap: 10px; } .list div { padding: 14px; color: var(--text); } .list strong, .footer a, .text a, .legal-footer a { color: var(--accent); } .muted { color: var(--muted); } .legal-footer, .footer { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); line-height: 1.8; }
    .date-header,#workout-content,.app-footer{padding:20px}.date-header{border-radius:24px}.date-day{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,15vw,76px);letter-spacing:2px;line-height:.9}.date-label{margin-top:6px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent)}.date-split{margin-top:4px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}.section-title{margin-bottom:12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}.exercise-list{display:flex;flex-direction:column;gap:10px}.ex-left{flex:1;min-width:0}.ex-name{font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ex-meta{margin-top:4px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}.exercise-item.done{border-color:rgba(0,232,122,.4)}.ex-sets-done{color:var(--green);font-family:'Space Mono',monospace;font-size:11px}.ex-sets-todo{color:var(--muted);font-family:'Space Mono',monospace;font-size:11px}.rest-card,.no-split{text-align:center;padding:28px 18px}.modal-overlay{position:fixed;inset:0;z-index:45;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);transition:opacity .25s}.modal-overlay.open{opacity:1;pointer-events:all}.modal{width:min(100%,600px);background:#0f1113;border:1px solid var(--border);border-top-left-radius:28px;border-top-right-radius:28px;border-bottom:none;padding:8px 20px calc(32px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}.modal-overlay.open .modal{transform:translateY(0)}.modal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}.modal-title{font-size:32px}.modal-muscle{margin-top:6px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}.sets-container{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}.set-row{display:grid;grid-template-columns:34px minmax(0,1fr) minmax(0,1fr) 34px;gap:8px;align-items:center}.set-num,.set-input-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center}.set-input{text-align:center}.set-delete{border:1px solid rgba(255,77,77,.22);background:rgba(255,77,77,.08);color:#ffb5b5;width:34px;height:34px;border-radius:10px;cursor:pointer}.app-footer{width:min(100%,600px);margin:0 auto;text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);background:transparent;border:none}.app-footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">GYM<span>.</span>DIARY</div>
    <div class="nav-right">
      <a href="splits.html" class="nav-btn">Splits</a>
      <button class="nav-btn" onclick="Auth.logout()">Logout</button>
    </div>
  </nav>

  <main>
    <section class="date-header">
      <div class="date-day" id="date-day">—</div>
      <div class="date-label" id="date-label">Ready to Train</div>
      <div class="date-split" id="date-split"></div>
    </section>

    <section id="workout-content">
      <div class="skeleton"></div>
      <div class="skeleton" style="opacity:0.58"></div>
      <div class="skeleton" style="opacity:0.36"></div>
    </section>
  </main>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div style="width:40px;height:4px;border-radius:99px;background:var(--border);margin:0 auto 20px;"></div>
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-ex-name">—</div>
          <div class="modal-muscle" id="modal-ex-muscle"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div id="prev-session-box" class="prev-session" style="display:none"></div>

      <div class="sets-container" id="sets-container"></div>
      <button class="btn-add-set" onclick="addSetRow()">+ Add Set</button>
      <button class="btn-save" id="save-btn" onclick="saveSets()">Save Session</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <footer class="app-footer">
    <a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="about.html">About</a>
  </footer>
  <nav class="bottom-nav">
    <a href="dashboard.html" class="active">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Today
    </a>
    <a href="splits.html">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Splits
    </a>
    <a href="analytics.html">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Stats
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <script src="/static/api.js"></script>
  <script>
    requireAuth();

    let todayData = null;
    let currentExercise = null;

    async function init() {
      const now = new Date();
      document.getElementById('date-day').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });

      const res = await Logs.getToday();

      if (!res.ok) {
        if (res.data.error?.includes('No active split')) {
          renderNoSplit();
        }
        return;
      }

      todayData = res.data;

      if (todayData.is_rest) {
        renderRestDay();
        return;
      }

      document.getElementById('date-label').textContent = todayData.day_label + ' Day';
      document.getElementById('date-split').textContent = todayData.split_name;
      renderExercises(todayData.exercises);
    }

    function renderNoSplit() {
      document.getElementById('date-label').textContent = 'No active split';
      document.getElementById('workout-content').innerHTML = `
        <div class="no-split">
          <p>You don't have an active split yet.<br>Set one up to start tracking.</p>
          <a href="splits.html" class="btn-yellow">Setup Split</a>
        </div>`;
    }

    function renderRestDay() {
      document.getElementById('date-label').textContent = 'Rest Day';
      document.getElementById('date-split').textContent = todayData.split_name || '';
      document.getElementById('workout-content').innerHTML = `
        <div class="rest-card">
          <div class="rest-icon">💤</div>
          <div class="rest-title">Rest & Recover</div>
        </div>`;
    }

    function renderExercises(exercises) {
      const html = exercises.map(ex => {
        const loggedCount = ex.logged_sets?.length || 0;
        const isDone = loggedCount >= ex.default_sets;
        return `
          <div class="exercise-item ${isDone ? 'done' : ''}" onclick="openModal(${ex.id})">
            <div class="ex-left">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-meta">${ex.muscle_group || ''} · ${ex.default_sets} sets</div>
            </div>
            ${isDone
              ? `<div class="ex-sets-done">✓ ${loggedCount} sets</div>`
              : loggedCount > 0
                ? `<div class="ex-sets-done">${loggedCount}/${ex.default_sets} sets</div>`
                : `<div class="ex-sets-todo">${ex.default_sets} sets</div>`
            }
          </div>`;
      }).join('');

      document.getElementById('workout-content').innerHTML = `
        <p class="section-title">Today's Exercises</p>
        <div class="exercise-list">${html}</div>`;
    }

    function openModal(exerciseId) {
      currentExercise = todayData.exercises.find(e => e.id === exerciseId);
      if (!currentExercise) return;

      document.getElementById('modal-ex-name').textContent = currentExercise.name;
      document.getElementById('modal-ex-muscle').textContent = currentExercise.muscle_group || '';

      const sets = currentExercise.logged_sets?.length
        ? currentExercise.logged_sets
        : Array.from({ length: currentExercise.default_sets }, (_, i) => ({
            set_number: i + 1, reps: '', weight: ''
          }));

      renderSetRows(sets);
      loadPreviousSession(exerciseId);
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      currentExercise = null;
    }

    function closeModalOnOverlay(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    function renderSetRows(sets) {
      const container = document.getElementById('sets-container');
      container.innerHTML = sets.map((s, i) => `
        <div class="set-row" id="set-row-${i}">
          <div class="set-num">S${i + 1}</div>
          <div>
            <input class="set-input" type="number" placeholder="kg" min="0" step="0.5"
              value="${s.weight || ''}" id="weight-${i}" />
            <div class="set-input-label">kg</div>
          </div>
          <div>
            <input class="set-input" type="number" placeholder="reps" min="1"
              value="${s.reps || ''}" id="reps-${i}" />
            <div class="set-input-label">reps</div>
          </div>
          <button class="set-delete" onclick="removeSetRow(${i})">✕</button>
        </div>`).join('');
    }

    function addSetRow() {
      const container = document.getElementById('sets-container');
      const count = container.children.length;
      const div = document.createElement('div');
      div.className = 'set-row';
      div.id = `set-row-${count}`;
      div.innerHTML = `
        <div class="set-num">S${count + 1}</div>
        <div>
          <input class="set-input" type="number" placeholder="kg" min="0" step="0.5" id="weight-${count}" />
          <div class="set-input-label">kg</div>
        </div>
        <div>
          <input class="set-input" type="number" placeholder="reps" min="1" id="reps-${count}" />
          <div class="set-input-label">reps</div>
        </div>
        <button class="set-delete" onclick="removeSetRow(${count})">✕</button>`;
      container.appendChild(div);
    }

    function removeSetRow(index) {
      const row = document.getElementById(`set-row-${index}`);
      if (row) row.remove();
      const rows = document.querySelectorAll('.set-row');
      rows.forEach((r, i) => {
        r.id = `set-row-${i}`;
        r.querySelector('.set-num').textContent = `S${i + 1}`;
        r.querySelector('.set-input:first-of-type').id = `weight-${i}`;
        r.querySelector('.set-input:last-of-type').id = `reps-${i}`;
        r.querySelector('.set-delete').setAttribute('onclick', `removeSetRow(${i})`);
      });
    }

    async function loadPreviousSession(exerciseId) {
      const box = document.getElementById('prev-session-box');
      const res = await Logs.getExerciseHistory(exerciseId);
      if (!res.ok || !res.data.history?.length) { box.style.display = 'none'; return; }

      const last = res.data.history[0];
      const summary = last.sets.map(s => `${s.weight}kg×${s.reps}`).join('  ');
      box.style.display = 'block';
      box.innerHTML = `<strong>Last session (${last.date}):</strong><br>${summary}`;
    }

    async function saveSets() {
      const btn = document.getElementById('save-btn');
      const rows = document.querySelectorAll('.set-row');
      const sets = [];

      rows.forEach((_, i) => {
        const weight = parseFloat(document.getElementById(`weight-${i}`)?.value);
        const reps = parseInt(document.getElementById(`reps-${i}`)?.value);
        if (!isNaN(weight) && !isNaN(reps)) {
          sets.push({ set_number: i + 1, reps, weight });
        }
      });

      if (sets.length === 0) { showToast('Enter at least one set', true); return; }

      btn.disabled = true;
      btn.textContent = 'Saving...';

      const res = await Logs.logSets(currentExercise.id, sets);

      if (res.ok) {
        showToast(`${sets.length} sets saved ✓`);
        closeModal();
        init();
      } else {
        showToast('Error saving', true);
        btn.disabled = false;
        btn.textContent = 'Save Session';
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? 'var(--error)' : 'var(--done)';
      t.style.color = isError ? '#fff' : '#08100b';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
